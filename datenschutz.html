<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datenschutz — Immoskop</title>
  <meta name="description" content="Datenschutzerklärung von Immoskop. Keine Cookies, kein Tracking, keine personenbezogenen Daten.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.immoskop.ch/datenschutz.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Schibsted+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root{--cream:#F5F0E8;--ink:#1A1916;--ink-light:#6A6864;--red:#C8371A;--rule:rgba(26,25,22,0.12);--font-display:"DM Serif Display",Georgia,serif;--font-body:"Schibsted Grotesk",sans-serif;--font-mono:"DM Mono",monospace;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.7;}
  header{border-bottom:1px solid var(--rule);padding:0 clamp(20px,5vw,80px);display:flex;align-items:center;justify-content:space-between;height:68px;}
  .logo{text-decoration:none;display:flex;align-items:center;gap:10px;}
  .logo img{height:52px;}
  .logo-text{font-family:var(--font-display);font-size:26px;color:var(--ink);}
  .logo-text em{font-style:italic;color:var(--red);}
  main{max-width:720px;margin:0 auto;padding:clamp(40px,6vw,80px) clamp(20px,5vw,40px);}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
  h1{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);line-height:1.1;letter-spacing:-0.02em;margin-bottom:28px;}
  h2{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);margin:32px 0 8px;}
  p{margin-bottom:12px;color:#3A3835;}
  ul{padding-left:20px;margin-bottom:12px;color:#3A3835;}
  li{margin-bottom:4px;}
  a{color:var(--red);}
  .highlight{background:white;border:1px solid var(--rule);padding:16px 20px;margin:16px 0;font-size:14px;}
  .divider{height:1px;background:var(--rule);margin:32px 0;}
  footer{border-top:1px solid var(--rule);padding:20px clamp(20px,5vw,80px);font-family:var(--font-mono);font-size:10px;color:var(--ink-light);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:60px;}
  footer a{color:var(--ink-light);text-decoration:none;}
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><img src="/logo.png" alt="Immoskop" style="height:36px;width:auto;"></a>
  <nav><a href="/" style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;" data-t="nav_home">Home</a></nav>
  <div style="display:flex;gap:2px;">
    <button onclick="setSubLang('de')" id="sl-de" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:var(--ink);color:var(--cream);cursor:pointer;">DE</button>
    <button onclick="setSubLang('en')" id="sl-en" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:none;color:#6A6864;cursor:pointer;">EN</button>
    <button onclick="setSubLang('fr')" id="sl-fr" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:none;color:#6A6864;cursor:pointer;">FR</button>
  </div>
</header>
<main id="main-content"></main>
<footer>
  <span data-t="footer_copy">© 2026 Immoskop — Zürich, Schweiz</span>
  <div style="display:flex;gap:20px;">
    <a href="/ueber-uns.html" data-t="f_ueber">Über uns</a>
    <a href="/datenschutz.html" data-t="f_datenschutz">Datenschutz</a>
    <a href="/impressum.html" data-t="f_impressum">Impressum</a>
    <a href="/kontakt.html" data-t="f_kontakt">Kontakt</a>
  </div>
</footer>
<script>
const T = {
  de: {
    nav_home: "Home", footer_copy: "© 2026 Immoskop — Zürich, Schweiz",
    f_ueber: "Über uns", f_datenschutz: "Datenschutz", f_impressum: "Impressum", f_kontakt: "Kontakt",
    main: `
      <div class="tag">Rechtliches</div>
      <h1>Datenschutz&shy;erklärung</h1>
      <div class="highlight"><strong>Kurzfassung:</strong> Immoskop speichert keine vollständigen Adressen und keine IP-Adressen. Strassennamen (ohne Hausnummer) werden anonym zur Verbesserung der Marktdatenbank gespeichert. Kein Cross-Site-Tracking, keine Werbung.</div>
      <h2>Verantwortliche Stelle</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3, 7415 Pratval<br>Schweiz</p>
      <div class="divider"></div>
      <h2>Welche Daten werden verarbeitet?</h2>
      <p>Bei jeder Analyse werden folgende Daten temporär verarbeitet:</p>
      <ul><li>Die eingegebene Adresse (für die Geocodierung — Hausnummer wird nicht gespeichert)</li><li>Formularangaben (Preis, Fläche, Zimmer etc.) — nur für die Berechnung</li><li>Allfällig eingefügter Inseratstext — nur für die KI-Analyse</li></ul>
      <p>Die vollständige Adresse (mit Hausnummer) wird nicht gespeichert.</p>
      <div class="divider"></div>
      <h2>Anonyme Nutzungsstatistiken</h2>
      <p>Immoskop erfasst anonyme Nutzungsstatistiken zur Verbesserung der Marktdatenbank. Diese enthalten:</p>
      <ul><li>Strassenname <strong>ohne Hausnummer</strong> sowie PLZ und Gemeinde</li><li>Objekttyp, Zimmeranzahl, Fläche</li><li>Prozentuale Abweichung vom Marktpreis</li></ul>
      <p>Es werden keine IP-Adressen, keine vollständigen Adressen und keine personenbezogenen Angaben gespeichert.</p>
      <div class="divider"></div>
      <h2>Cookies und Tracking</h2>
      <p>Immoskop verwendet keine Cookies und kein Cross-Site-Tracking. Es werden keine Daten an Werbenetzwerke weitergegeben.</p>
      <div class="divider"></div>
      <h2>Drittanbieter</h2>
      <ul><li><strong>swisstopo API</strong> — Geocodierung (Bund)</li><li><strong>BAFU WMS</strong> — Lärmdaten (Bund)</li><li><strong>Geoapify</strong> — Umgebungsdaten</li><li><strong>Anthropic Claude API</strong> — KI-Analyse</li></ul>
      <div class="divider"></div>
      <h2>Ihre Rechte (DSG / DSGVO)</h2>
      <p>Da Immoskop keine personenbezogenen Daten speichert, gibt es grundsätzlich keine Daten auf die Auskunfts- oder Löschungsrechte anwendbar wären. Bei Fragen: <a href="/kontakt.html">Kontaktformular</a></p>`
  },
  en: {
    nav_home: "Home", footer_copy: "© 2026 Immoskop — Zurich, Switzerland",
    f_ueber: "About", f_datenschutz: "Privacy", f_impressum: "Legal", f_kontakt: "Contact",
    main: `
      <div class="tag">Legal</div>
      <h1>Privacy Policy</h1>
      <div class="highlight"><strong>Summary:</strong> Immoskop does not store full addresses or IP addresses. Street names (without house numbers) are stored anonymously to improve the market database. No cross-site tracking, no advertising.</div>
      <h2>Data controller</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3, 7415 Pratval<br>Switzerland</p>
      <div class="divider"></div>
      <h2>What data is processed?</h2>
      <p>The following data is temporarily processed for each analysis:</p>
      <ul><li>The entered address (for geocoding — house number is not stored)</li><li>Form data (price, area, rooms etc.) — only for calculation</li><li>Any pasted listing text — only for AI analysis</li></ul>
      <p>The full address (including house number) is not stored.</p>
      <div class="divider"></div>
      <h2>Anonymous usage statistics</h2>
      <p>Immoskop collects anonymous usage statistics to improve the market database. These include:</p>
      <ul><li>Street name <strong>without house number</strong>, postcode and municipality</li><li>Property type, number of rooms, area</li><li>Percentage deviation from market price</li></ul>
      <p>No IP addresses, no full addresses and no personal data are stored.</p>
      <div class="divider"></div>
      <h2>Cookies and tracking</h2>
      <p>Immoskop uses no cookies and no cross-site tracking. No data is passed to advertising networks.</p>
      <div class="divider"></div>
      <h2>Third-party services</h2>
      <ul><li><strong>swisstopo API</strong> — geocoding (federal)</li><li><strong>BAFU WMS</strong> — noise data (federal)</li><li><strong>Geoapify</strong> — neighbourhood data</li><li><strong>Anthropic Claude API</strong> — AI analysis</li></ul>
      <div class="divider"></div>
      <h2>Your rights (FADP / GDPR)</h2>
      <p>Since Immoskop does not store personal data, there is generally no data to which rights of access or deletion would apply. For questions: <a href="/kontakt.html">Contact form</a></p>`
  },
  fr: {
    nav_home: "Accueil", footer_copy: "© 2026 Immoskop — Zurich, Suisse",
    f_ueber: "À propos", f_datenschutz: "Confidentialité", f_impressum: "Mentions légales", f_kontakt: "Contact",
    main: `
      <div class="tag">Mentions légales</div>
      <h1>Politique de confidentialité</h1>
      <div class="highlight"><strong>Résumé:</strong> Immoskop ne stocke pas les adresses complètes ni les adresses IP. Les noms de rues (sans numéro) sont stockés anonymement pour améliorer la base de données. Pas de suivi inter-sites, pas de publicité.</div>
      <h2>Responsable du traitement</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3, 7415 Pratval<br>Suisse</p>
      <div class="divider"></div>
      <h2>Quelles données sont traitées?</h2>
      <p>Les données suivantes sont traitées temporairement pour chaque analyse:</p>
      <ul><li>L'adresse saisie (pour la géolocalisation — le numéro de rue n'est pas stocké)</li><li>Données du formulaire (prix, surface, pièces etc.) — uniquement pour le calcul</li><li>Tout texte d'annonce collé — uniquement pour l'analyse IA</li></ul>
      <p>L'adresse complète (avec numéro) n'est pas stockée.</p>
      <div class="divider"></div>
      <h2>Statistiques d'utilisation anonymes</h2>
      <p>Immoskop collecte des statistiques d'utilisation anonymes pour améliorer la base de données. Ces statistiques comprennent:</p>
      <ul><li>Nom de rue <strong>sans numéro</strong>, code postal et commune</li><li>Type de bien, nombre de pièces, surface</li><li>Écart en pourcentage par rapport au prix du marché</li></ul>
      <p>Aucune adresse IP, adresse complète ou donnée personnelle n'est stockée.</p>
      <div class="divider"></div>
      <h2>Cookies et suivi</h2>
      <p>Immoskop n'utilise pas de cookies ni de suivi inter-sites. Aucune donnée n'est transmise à des réseaux publicitaires.</p>
      <div class="divider"></div>
      <h2>Services tiers</h2>
      <ul><li><strong>swisstopo API</strong> — géolocalisation (fédéral)</li><li><strong>BAFU WMS</strong> — données acoustiques (fédéral)</li><li><strong>Geoapify</strong> — données de quartier</li><li><strong>Anthropic Claude API</strong> — analyse IA</li></ul>
      <div class="divider"></div>
      <h2>Vos droits (LPD / RGPD)</h2>
      <p>Immoskop ne stockant pas de données personnelles, il n'y a en principe pas de données auxquelles s'appliqueraient des droits d'accès ou de suppression. Pour toute question: <a href="/kontakt.html">Formulaire de contact</a></p>`
  }
};

function setSubLang(lang) {
  ["de","en","fr"].forEach(l => {
    const btn = document.getElementById("sl-"+l);
    if (btn) { btn.style.background = l===lang?"var(--ink)":"none"; btn.style.color = l===lang?"var(--cream)":"#6A6864"; }
  });
  const t = T[lang]; if (!t) return;
  document.querySelectorAll("[data-t]").forEach(el => {
    const key = el.getAttribute("data-t");
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  const mc = document.getElementById("main-content");
  if (mc && t.main) mc.innerHTML = t.main;
  localStorage.setItem("immoskop_lang", lang);
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("immoskop_lang") || (navigator.language||"de").substring(0,2);
  setSubLang(["de","en","fr"].includes(saved) ? saved : "de");
});
</script>
</body>
</html>
