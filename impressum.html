<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — Immoskop</title>
  <meta name="description" content="Impressum und rechtliche Angaben von Immoskop.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.immoskop.ch/impressum.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Schibsted+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root{--cream:#F5F0E8;--ink:#1A1916;--ink-light:#6A6864;--red:#C8371A;--rule:rgba(26,25,22,0.12);--font-display:"DM Serif Display",Georgia,serif;--font-body:"Schibsted Grotesk",sans-serif;--font-mono:"DM Mono",monospace;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.7;}
  header{border-bottom:1px solid var(--rule);padding:0 clamp(20px,5vw,80px);display:flex;align-items:center;justify-content:space-between;height:68px;}
  .logo{text-decoration:none;display:flex;align-items:center;gap:10px;}
  .logo img{height:52px;}
  .logo-text{font-family:var(--font-display);font-size:26px;color:var(--ink);}
  .logo-text em{font-style:italic;color:var(--red);}
  main{max-width:720px;margin:0 auto;padding:clamp(40px,6vw,80px) clamp(20px,5vw,40px);}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
  h1{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);line-height:1.1;letter-spacing:-0.02em;margin-bottom:28px;}
  h2{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);margin:32px 0 8px;}
  p{margin-bottom:12px;color:#3A3835;}
  a{color:var(--red);}
  .divider{height:1px;background:var(--rule);margin:32px 0;}
  footer{border-top:1px solid var(--rule);padding:20px clamp(20px,5vw,80px);font-family:var(--font-mono);font-size:10px;color:var(--ink-light);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:60px;}
  footer a{color:var(--ink-light);text-decoration:none;}
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><img src="/logo.png" alt="Immoskop" style="height:36px;width:auto;"></a>
  <nav><a href="/" style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;" data-t="nav_home">Home</a></nav>
  <div style="display:flex;gap:2px;">
    <button onclick="setSubLang('de')" id="sl-de" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:var(--ink);color:var(--cream);cursor:pointer;">DE</button>
    <button onclick="setSubLang('en')" id="sl-en" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:none;color:#6A6864;cursor:pointer;">EN</button>
    <button onclick="setSubLang('fr')" id="sl-fr" style="font-family:var(--font-mono);font-size:10px;padding:4px 8px;border:1px solid rgba(26,25,22,0.12);background:none;color:#6A6864;cursor:pointer;">FR</button>
  </div>
</header>
<main id="main-content"></main>
<footer>
  <span data-t="footer_copy">© 2026 Immoskop — Zürich, Schweiz</span>
  <div style="display:flex;gap:20px;">
    <a href="/ueber-uns.html" data-t="f_ueber">Über uns</a>
    <a href="/datenschutz.html" data-t="f_datenschutz">Datenschutz</a>
    <a href="/impressum.html" data-t="f_impressum">Impressum</a>
    <a href="/kontakt.html" data-t="f_kontakt">Kontakt</a>
  </div>
</footer>
<script>
const T = {
  de: {
    nav_home: "Home", footer_copy: "© 2026 Immoskop — Zürich, Schweiz",
    f_ueber: "Über uns", f_datenschutz: "Datenschutz", f_impressum: "Impressum", f_kontakt: "Kontakt",
    main: `
      <div class="tag">Rechtliches</div>
      <h1>Impressum</h1>
      <h2>Betreiber</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3<br>7415 Pratval<br>Schweiz</p>
      <div class="divider"></div>
      <h2>Kontakt</h2>
      <p><a href="/kontakt.html">Kontaktformular</a></p>
      <div class="divider"></div>
      <h2>Haftungsausschluss</h2>
      <p>Die auf Immoskop bereitgestellten Analysen dienen ausschliesslich zur allgemeinen Orientierung. Sie stellen keine Rechts-, Finanz- oder Anlageberatung dar. Die Preisschätzungen basieren auf statistischen Modellen und öffentlich verfügbaren Daten — sie sind keine verbindlichen Bewertungen im Sinne des Schweizer Immobilienrechts.</p>
      <div class="divider"></div>
      <h2>Urheberrecht</h2>
      <p>Alle Inhalte dieser Website sind urheberrechtlich geschützt. Die verwendeten Datenquellen (BAFU, swisstopo, BFS, OpenStreetMap) stehen unter ihren jeweiligen Lizenzbedingungen.</p>`
  },
  en: {
    nav_home: "Home", footer_copy: "© 2026 Immoskop — Zurich, Switzerland",
    f_ueber: "About", f_datenschutz: "Privacy", f_impressum: "Legal", f_kontakt: "Contact",
    main: `
      <div class="tag">Legal</div>
      <h1>Legal notice</h1>
      <h2>Operator</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3<br>7415 Pratval<br>Switzerland</p>
      <div class="divider"></div>
      <h2>Contact</h2>
      <p><a href="/kontakt.html">Contact form</a></p>
      <div class="divider"></div>
      <h2>Disclaimer</h2>
      <p>The analyses provided by Immoskop are for general information purposes only. They do not constitute legal, financial or investment advice. Price estimates are based on statistical models and publicly available data — they are not binding valuations under Swiss property law.</p>
      <div class="divider"></div>
      <h2>Copyright</h2>
      <p>All content on this website is protected by copyright. The data sources used (BAFU, swisstopo, BFS, OpenStreetMap) are subject to their respective licence conditions.</p>`
  },
  fr: {
    nav_home: "Accueil", footer_copy: "© 2026 Immoskop — Zurich, Suisse",
    f_ueber: "À propos", f_datenschutz: "Confidentialité", f_impressum: "Mentions légales", f_kontakt: "Contact",
    main: `
      <div class="tag">Mentions légales</div>
      <h1>Mentions légales</h1>
      <h2>Opérateur</h2>
      <p>Däscher &amp; Partner Immobilien GmbH<br>Cresta 3<br>7415 Pratval<br>Suisse</p>
      <div class="divider"></div>
      <h2>Contact</h2>
      <p><a href="/kontakt.html">Formulaire de contact</a></p>
      <div class="divider"></div>
      <h2>Clause de non-responsabilité</h2>
      <p>Les analyses fournies par Immoskop sont uniquement destinées à l'information générale. Elles ne constituent pas un conseil juridique, financier ou en investissement. Les estimations de prix sont basées sur des modèles statistiques et des données publiques — elles ne constituent pas des évaluations contraignantes au sens du droit immobilier suisse.</p>
      <div class="divider"></div>
      <h2>Droits d'auteur</h2>
      <p>Tout le contenu de ce site est protégé par le droit d'auteur. Les sources de données utilisées (OFEV, swisstopo, OFS, OpenStreetMap) sont soumises à leurs conditions de licence respectives.</p>`
  }
};

function setSubLang(lang) {
  ["de","en","fr"].forEach(l => {
    const btn = document.getElementById("sl-"+l);
    if (btn) { btn.style.background = l===lang?"var(--ink)":"none"; btn.style.color = l===lang?"var(--cream)":"#6A6864"; }
  });
  const t = T[lang]; if (!t) return;
  document.querySelectorAll("[data-t]").forEach(el => {
    const key = el.getAttribute("data-t");
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  const mc = document.getElementById("main-content");
  if (mc && t.main) mc.innerHTML = t.main;
  localStorage.setItem("immoskop_lang", lang);
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("immoskop_lang") || (navigator.language||"de").substring(0,2);
  setSubLang(["de","en","fr"].includes(saved) ? saved : "de");
});
</script>
</body>
</html>
